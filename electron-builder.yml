appId: com.agent-desktop.app
productName: Agent Desktop
directories:
  buildResources: build
files:
  - '!**/.env'
  - '!**/node_modules/*/{CHANGELOG.md,README.md,readme.md,LICENSE,license,License}'
asarUnpack:
  - resources/**
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [universal]
win:
  target:
    - target: nsis
      arch: [x64]
linux:
  target:
    - target: AppImage
      arch: [x64]
